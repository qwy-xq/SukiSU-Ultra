name: Build ksud

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      pack_lkm:
        required: false
        type: boolean
        default: false
      pack_ksuinit:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target architecture'
        required: true
        type: string
        default: 'aarch64-linux-android'
      pack_lkm:
        description: 'Pack LKM (true/false)'
        required: false
        type: boolean
        default: false
      pack_ksuinit:
        description: 'Pack ksuinit (Build on the fly)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v8
      continue-on-error: true

    - name: Prepare LKM files
      if: ${{ inputs.pack_lkm }}
      run: |
        cp android*-lkm/*_kernelsu.ko ./userspace/ksud/bin/aarch64/ || echo "No LKM files found"
        
    - name: Setup rustup
      run: |
        rustup update stable
        rustup target add ${{ inputs.target }}

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: userspace/ksud
        cache-targets: false

    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r29

    # 【核心修改】如果手动运行时勾选了 Pack ksuinit，直接在现场编译它，不再去外面的虚拟机找
    - name: Build ksuinit on the fly
      if: ${{ inputs.pack_ksuinit }}
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        rustup target add aarch64-unknown-linux-musl
        LLVM_BIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER="$LLVM_BIN/aarch64-linux-android26-clang"
        export RUSTFLAGS="-C link-arg=-no-pie"
        cargo build --package ksuinit --target=aarch64-unknown-linux-musl --release
        
        # 编译完成后，自动创建目录并复制到 ksud 预期的位置
        mkdir -p ./userspace/ksud/bin/aarch64/
        cp target/aarch64-unknown-linux-musl/release/ksuinit ./userspace/ksud/bin/aarch64/

    - name: Build ksud
      env:
        ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        source .github/scripts/setup-rust-build.sh ${{ inputs.target }} 26
        cargo build --target $TRIPLE --release --manifest-path ./userspace/ksud/Cargo.toml

    - name: Upload ksud artifact
      uses: actions/upload-artifact@v7
      with:
        name: ksud-${{ inputs.target }}
        path: target/${{ inputs.target }}/release/ksud
